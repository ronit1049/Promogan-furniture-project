<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart — Furniquin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset & Base ─────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --clr-bg: #faf9f7;
            --clr-surface: #ffffff;
            --clr-border: #e8e4de;
            --clr-text: #1a1814;
            --clr-muted: #6b6560;
            --clr-accent: #b5813e;
            --clr-accent-lt: #f3ead8;
            --clr-hover: #f5f2ee;
            --clr-danger: #c0362a;
            --clr-danger-lt: #fdf0ee;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', sans-serif;
            --radius-sm: 6px;
            --radius-md: 12px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.08);
            --transition: 0.2s ease;
            --max-w: 1000px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--clr-bg);
            color: var(--clr-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ──────────────────────────────────── */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 249, 247, 0.96);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--clr-border);
        }

        .header-inner {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--clr-text);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--clr-accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--clr-muted);
        }

        .header-right a {
            color: var(--clr-muted);
            text-decoration: none;
            transition: color var(--transition);
        }

        .header-right a:hover {
            color: var(--clr-accent);
        }

        /* ── Page wrapper ─────────────────────────────── */
        .cart-page {
            flex: 1;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 48px 24px 80px;
            width: 100%;
        }

        /* ── Page heading ─────────────────────────────── */
        .cart-heading-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .cart-heading {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 600;
            letter-spacing: -0.4px;
            line-height: 1.1;
        }

        .cart-item-count {
            font-size: 0.85rem;
            color: var(--clr-muted);
            font-weight: 400;
        }

        /* ── Empty state ──────────────────────────────── */
        .cart-empty {
            text-align: center;
            padding: 80px 24px;
        }

        .cart-empty-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--clr-accent-lt);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 1.8rem;
            color: var(--clr-accent);
        }

        .cart-empty h2 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .cart-empty p {
            font-size: 0.92rem;
            color: var(--clr-muted);
            margin-bottom: 28px;
        }

        .btn-start-shopping {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 28px;
            background: var(--clr-text);
            color: #fff;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background var(--transition);
        }

        .btn-start-shopping:hover {
            background: var(--clr-accent);
        }

        /* ── Cart table ───────────────────────────────── */
        .cart-table-wrap {
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--clr-surface);
            margin-bottom: 24px;
        }

        /* Table header */
        .cart-table-head {
            display: grid;
            grid-template-columns: 1fr 140px 130px 48px;
            gap: 0;
            padding: 12px 20px;
            background: var(--clr-hover);
            border-bottom: 1px solid var(--clr-border);
        }

        .cart-table-head span {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--clr-muted);
        }

        .cart-table-head span:nth-child(2),
        .cart-table-head span:nth-child(3) {
            text-align: center;
        }

        .cart-table-head span:last-child {
            text-align: center;
        }

        /* Each cart row */
        .cart-row {
            display: grid;
            grid-template-columns: 1fr 140px 130px 48px;
            gap: 0;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid var(--clr-border);
            transition: background var(--transition);
        }

        .cart-row:last-child {
            border-bottom: none;
        }

        .cart-row:hover {
            background: #fdfcfb;
        }

        /* Product cell */
        .cart-product {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .cart-product-img {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--clr-border);
            background: var(--clr-hover);
        }

        .cart-product-img-ph {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-sm);
            background: var(--clr-accent-lt);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 1px solid var(--clr-border);
        }

        .cart-product-details {
            min-width: 0;
        }

        .cart-product-name {
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.35;
            margin-bottom: 4px;
            /* truncate gracefully */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .cart-product-name a {
            color: inherit;
            text-decoration: none;
        }

        .cart-product-name a:hover {
            color: var(--clr-accent);
        }

        .cart-product-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .cart-meta-tag {
            font-size: 0.72rem;
            color: var(--clr-muted);
            background: var(--clr-hover);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid var(--clr-border);
        }

        /* Quantity cell */
        .cart-qty-cell {
            display: flex;
            justify-content: center;
        }

        .qty-stepper {
            display: flex;
            align-items: center;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--clr-bg);
        }

        .qty-btn {
            width: 34px;
            height: 34px;
            border: none;
            background: transparent;
            font-size: 1rem;
            cursor: pointer;
            color: var(--clr-text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
            line-height: 1;
            flex-shrink: 0;
        }

        .qty-btn:hover:not(:disabled) {
            background: var(--clr-hover);
        }

        .qty-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .qty-value {
            width: 36px;
            text-align: center;
            font-size: 0.88rem;
            font-weight: 500;
            border-left: 1px solid var(--clr-border);
            border-right: 1px solid var(--clr-border);
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Price cell */
        .cart-price-cell {
            text-align: center;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
        }

        /* Remove cell */
        .cart-remove-cell {
            display: flex;
            justify-content: center;
        }

        .btn-remove {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--clr-border);
            background: var(--clr-surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--clr-muted);
            transition: all var(--transition);
        }

        .btn-remove:hover {
            background: var(--clr-danger-lt);
            border-color: var(--clr-danger);
            color: var(--clr-danger);
        }

        /* Row remove animation */
        .cart-row.removing {
            animation: row-out 0.3s ease forwards;
        }

        @keyframes row-out {
            to {
                opacity: 0;
                transform: translateX(16px);
                max-height: 0;
                padding: 0 20px;
            }
        }

        /* ── Order summary ────────────────────────────── */
        .order-summary {
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            padding: 24px;
            max-width: 440px;
            margin-left: auto;
        }

        .summary-title {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--clr-muted);
            margin-bottom: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.88rem;
        }

        .summary-row.total-row {
            border-top: 1px solid var(--clr-border);
            padding-top: 16px;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .summary-row.total-row .summary-label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--clr-text);
        }

        .summary-row.total-row .summary-value {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .summary-label {
            color: var(--clr-muted);
        }

        .summary-value {
            font-weight: 500;
        }

        .summary-note {
            font-size: 0.78rem;
            color: var(--clr-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            margin-top: 12px;
        }

        .summary-note a {
            color: var(--clr-accent);
            text-decoration: none;
        }

        .summary-note a:hover {
            text-decoration: underline;
        }

        /* Checkout button */
        .btn-checkout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            background: var(--clr-accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: opacity var(--transition);
            margin-bottom: 14px;
        }

        .btn-checkout:hover {
            opacity: 0.88;
        }

        /* Continue shopping link */
        .continue-shopping {
            display: block;
            text-align: center;
            font-size: 0.83rem;
            color: var(--clr-muted);
            text-decoration: none;
            transition: color var(--transition);
        }

        .continue-shopping:hover {
            color: var(--clr-accent);
        }

        .continue-shopping i {
            margin-right: 4px;
            font-size: 0.75rem;
        }

        /* ── Footer ──────────────────────────────────── */
        footer {
            background: var(--clr-text);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.82rem;
        }

        .footer-bottom {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .footer-bottom a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
        }

        .footer-bottom a:hover {
            color: #fff;
        }

        /* ── Mobile: card layout under 640px ─────────── */
        @media (max-width: 640px) {
            .cart-table-head {
                display: none;
            }

            .cart-table-wrap {
                border-radius: 0;
                border-left: none;
                border-right: none;
            }

            .cart-row {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                gap: 14px;
                padding: 18px 16px;
                position: relative;
            }

            /* Product takes full width */
            .cart-product {
                grid-column: 1;
            }

            /* Qty and price side by side */
            .cart-qty-cell {
                justify-content: flex-start;
                grid-column: 1;
            }

            .cart-price-cell {
                text-align: left;
                grid-column: 1;
            }

            /* Remove floated top-right */
            .cart-remove-cell {
                position: absolute;
                top: 18px;
                right: 16px;
            }

            /* Show inline labels on mobile */
            .cart-qty-cell::before {
                content: "Qty: ";
                font-size: 0.78rem;
                color: var(--clr-muted);
                margin-right: 8px;
                display: flex;
                align-items: center;
            }

            .cart-price-cell::before {
                content: "Price: ";
                font-size: 0.78rem;
                color: var(--clr-muted);
                margin-right: 4px;
                font-family: var(--font-body);
                font-size: 0.82rem;
                font-weight: 400;
            }

            .order-summary {
                max-width: 100%;
            }

            .cart-page {
                padding: 32px 0 60px;
            }

            .cart-heading-row {
                padding: 0 16px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="main-header">
        <div class="header-inner">
            <a href="index.html" class="logo">Furni<span>quin</span></a>
            <div class="header-right">
                <a href="index.html"><i class="fas fa-arrow-left" style="font-size:0.75rem;margin-right:4px;"></i>
                    Continue Shopping</a>
            </div>
        </div>
    </header>

    <!-- MAIN CART PAGE -->
    <main class="cart-page">

        <div class="cart-heading-row">
            <h1 class="cart-heading">Your Cart</h1>
            <span class="cart-item-count" id="cart-item-count"></span>
        </div>

        <!-- Filled by JS -->
        <div id="cart-body"></div>

    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-bottom">
            <span>© 2026 Furniquin. All rights reserved.</span>
            <span><a href="#">Privacy Policy</a> · <a href="#">Terms of Service</a></span>
        </div>
    </footer>

    <script>
        /* ─── Constants ──────────────────────────────── */
        const CART_KEY = "furniquin_cart";

        /* ─── Helpers ────────────────────────────────── */
        function esc(s) {
            return String(s ?? "")
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function formatINR(num) {
            // Indian format: ₹75,000 / ₹1,50,000
            return "₹" + Math.round(Number(num)).toLocaleString("en-IN");
        }

        /* ─── Cart storage ───────────────────────────── */
        function getCart() {
            try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
            catch { return []; }
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        function removeItem(sku) {
            const cart = getCart().filter(i => i.sku !== sku);
            saveCart(cart);
        }

        function updateQty(sku, delta) {
            const cart = getCart();
            const item = cart.find(i => i.sku === sku);
            if (!item) return;
            item.qty = Math.max(1, item.qty + delta);
            saveCart(cart);
        }

        /* ─── Total calculation ──────────────────────── */
        function calcTotal(cart) {
            return cart.reduce((sum, item) => sum + item.price * item.qty, 0);
        }

        /* ─── Render ─────────────────────────────────── */
        function render() {
            const cart = getCart();
            const body = document.getElementById("cart-body");
            const counter = document.getElementById("cart-item-count");

            const totalItems = cart.reduce((s, i) => s + i.qty, 0);
            counter.textContent = totalItems > 0
                ? `${totalItems} item${totalItems !== 1 ? "s" : ""}`
                : "";

            /* ── Empty state ── */
            if (cart.length === 0) {
                body.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon"><i class="fas fa-shopping-bag"></i></div>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added anything yet.<br>Let's change that.</p>
                        <a href="index.html#categories" class="btn-start-shopping">
                            <i class="fas fa-arrow-right"></i> Start Shopping
                        </a>
                    </div>`;
                return;
            }

            /* ── Build table rows ── */
            const rows = cart.map(item => {
                const lineTotal = item.price * item.qty;

                // Variant meta tags (color / size / material)
                const metaTags = [
                    item.color ? `<span class="cart-meta-tag">${esc(item.color)}</span>` : "",
                    item.size ? `<span class="cart-meta-tag">${esc(item.size)}</span>` : "",
                    item.material ? `<span class="cart-meta-tag">${esc(item.material)}</span>` : "",
                ].filter(Boolean).join("");

                // Image
                const imgHtml = item.image
                    ? `<img class="cart-product-img" src="${esc(item.image)}" alt="${esc(item.name)}" loading="lazy" />`
                    : `<div class="cart-product-img-ph">🪑</div>`;

                return `
                    <div class="cart-row" id="row-${esc(item.sku)}" data-sku="${esc(item.sku)}">

                        <!-- Product -->
                        <div class="cart-product">
                            ${imgHtml}
                            <div class="cart-product-details">
                                <div class="cart-product-name">
                                    <a href="product.html?slug=${encodeURIComponent(item.slug || "")}">${esc(item.name)}</a>
                                </div>
                                ${metaTags ? `<div class="cart-product-meta">${metaTags}</div>` : ""}
                                <div style="font-size:0.72rem;color:var(--clr-muted);margin-top:4px;">SKU: ${esc(item.sku)}</div>
                            </div>
                        </div>

                        <!-- Quantity -->
                        <div class="cart-qty-cell">
                            <div class="qty-stepper">
                                <button class="qty-btn btn-minus" data-sku="${esc(item.sku)}"
                                    aria-label="Decrease quantity"
                                    ${item.qty <= 1 ? "disabled" : ""}>−</button>
                                <div class="qty-value" id="qty-${esc(item.sku)}">${item.qty}</div>
                                <button class="qty-btn btn-plus" data-sku="${esc(item.sku)}"
                                    aria-label="Increase quantity">+</button>
                            </div>
                        </div>

                        <!-- Price -->
                        <div class="cart-price-cell" id="price-${esc(item.sku)}">
                            ${formatINR(lineTotal)}
                        </div>

                        <!-- Remove -->
                        <div class="cart-remove-cell">
                            <button class="btn-remove btn-del" data-sku="${esc(item.sku)}"
                                aria-label="Remove ${esc(item.name)} from cart"
                                title="Remove item">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>

                    </div>`;
            }).join("");

            /* ── Total ── */
            const total = calcTotal(cart);

            body.innerHTML = `
                <!-- Table -->
                <div class="cart-table-wrap">
                    <div class="cart-table-head">
                        <span>Product</span>
                        <span>Quantity</span>
                        <span>Price</span>
                        <span></span>
                    </div>
                    ${rows}
                </div>

                <!-- Order summary -->
                <div class="order-summary">
                    <div class="summary-title">Order Summary</div>

                    <div class="summary-row">
                        <span class="summary-label">Subtotal (${totalItems} item${totalItems !== 1 ? "s" : ""})</span>
                        <span class="summary-value" id="subtotal-val">${formatINR(total)}</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Shipping</span>
                        <span class="summary-value" style="color:var(--clr-success,#2d7d4f);">Calculated at checkout</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Tax</span>
                        <span class="summary-value" style="color:var(--clr-success,#2d7d4f);">Included</span>
                    </div>

                    <div class="summary-row total-row">
                        <span class="summary-label">Estimated Total</span>
                        <span class="summary-value" id="total-val">${formatINR(total)}</span>
                    </div>

                    <p class="summary-note">
                        Taxes included. Discounts and
                        <a href="shipping.html">shipping</a>
                        calculated at checkout.
                    </p>

                    <a href="checkout.html" class="btn-checkout">
                        Proceed to Checkout <i class="fas fa-arrow-right"></i>
                    </a>

                    <a href="index.html#categories" class="continue-shopping">
                        <i class="fas fa-arrow-left"></i> Continue shopping
                    </a>
                </div>
            `;

            /* ── Wire events (after innerHTML set) ── */
            wireEvents();
        }

        /* ─── Event wiring ───────────────────────────── */
        function wireEvents() {
            const body = document.getElementById("cart-body");

            /* Minus buttons */
            body.querySelectorAll(".btn-minus").forEach(btn => {
                btn.addEventListener("click", () => {
                    const sku = btn.dataset.sku;
                    updateQty(sku, -1);
                    refreshRow(sku);
                });
            });

            /* Plus buttons */
            body.querySelectorAll(".btn-plus").forEach(btn => {
                btn.addEventListener("click", () => {
                    const sku = btn.dataset.sku;
                    updateQty(sku, +1);
                    refreshRow(sku);
                });
            });

            /* Delete buttons */
            body.querySelectorAll(".btn-del").forEach(btn => {
                btn.addEventListener("click", () => {
                    const sku = btn.dataset.sku;
                    const row = document.getElementById(`row-${sku}`);
                    if (row) {
                        row.classList.add("removing");
                        row.addEventListener("animationend", () => {
                            removeItem(sku);
                            render(); // full re-render to update totals + counter
                        }, { once: true });
                    }
                });
            });
        }

        /* ─── Refresh a single row without full re-render ── */
        function refreshRow(sku) {
            const cart = getCart();
            const item = cart.find(i => i.sku === sku);
            if (!item) return;

            // Update qty display
            const qtyEl = document.getElementById(`qty-${sku}`);
            const priceEl = document.getElementById(`price-${sku}`);
            const rowEl = document.getElementById(`row-${sku}`);
            if (qtyEl) qtyEl.textContent = item.qty;
            if (priceEl) priceEl.textContent = formatINR(item.price * item.qty);

            // Disable minus at qty=1
            const minusBtn = rowEl?.querySelector(".btn-minus");
            if (minusBtn) minusBtn.disabled = item.qty <= 1;

            // Recalculate totals
            updateTotals();
            updateItemCount();
        }

        function updateTotals() {
            const cart = getCart();
            const total = calcTotal(cart);
            const subEl = document.getElementById("subtotal-val");
            const totEl = document.getElementById("total-val");
            if (subEl) subEl.textContent = formatINR(total);
            if (totEl) totEl.textContent = formatINR(total);
        }

        function updateItemCount() {
            const cart = getCart();
            const totalItems = cart.reduce((s, i) => s + i.qty, 0);
            const counter = document.getElementById("cart-item-count");
            if (counter) counter.textContent = totalItems > 0
                ? `${totalItems} item${totalItems !== 1 ? "s" : ""}`
                : "";

            // Also update subtotal row label
            const subLabel = document.querySelector(".summary-row .summary-label");
            if (subLabel && subLabel.textContent.startsWith("Subtotal")) {
                subLabel.textContent = `Subtotal (${totalItems} item${totalItems !== 1 ? "s" : ""})`;
            }
        }

        /* ─── Boot ───────────────────────────────────── */
        render();
    </script>
</body>

</html>
