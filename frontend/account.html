<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
</head>
<body>
    <h2>My account</h2>
    <button id="logoutBtn">Logout</button>


    <h2>Your orders</h2>
    <button id="orderBtn">Orders</button>

    <script>
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            try {
                const res = await fetch("http://localhost:8000/auth/sign-out", {
                    method: "POST",
                    credentials: "include"
                })

                const data = await res.json()
                if(res.ok) {
                    window.location.href = "./index.html"
                } else {
                    alert(data.message)
                }
            } catch (err) {
                console.error(err)
                alert("Logout failed")
            }
        })

        document.getElementById("orderBtn").addEventListener("click", (e)=>{
            e.preventDefault()
            window.location.href = "./orders.html"
        })
    </script>
</body>
</html>
