<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product — Furniquin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset & Base ─────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --clr-bg: #faf9f7;
            --clr-surface: #ffffff;
            --clr-border: #e8e4de;
            --clr-text: #1a1814;
            --clr-muted: #6b6560;
            --clr-accent: #b5813e;
            --clr-accent-lt: #f3ead8;
            --clr-hover: #f5f2ee;
            --clr-success: #2d7d4f;
            --clr-success-lt: #e8f5ee;
            --clr-warn: #c0622a;
            --clr-warn-lt: #fdf0e8;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', sans-serif;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.09);
            --shadow-lg: 0 16px 56px rgba(0, 0, 0, 0.16);
            --transition: 0.2s ease;
            --max-w: 1240px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--clr-bg);
            color: var(--clr-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ──────────────────────────────────── */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 249, 247, 0.96);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--clr-border);
        }

        .header-inner {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--clr-text);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--clr-accent);
        }

        .header-cart-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            background: var(--clr-surface);
            font-family: var(--font-body);
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--clr-text);
            text-decoration: none;
            transition: border-color var(--transition), background var(--transition);
        }

        .header-cart-btn:hover {
            border-color: var(--clr-accent);
            background: var(--clr-accent-lt);
        }

        .cart-badge {
            background: var(--clr-accent);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 500;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        /* ── Breadcrumb ──────────────────────────────── */
        .breadcrumb-bar {
            background: var(--clr-surface);
            border-bottom: 1px solid var(--clr-border);
            padding: 12px 0;
        }

        .bc-inner {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--clr-muted);
            list-style: none;
            flex-wrap: wrap;
        }

        .breadcrumb li a {
            color: var(--clr-muted);
            text-decoration: none;
            transition: color var(--transition);
        }

        .breadcrumb li a:hover {
            color: var(--clr-accent);
        }

        .breadcrumb li.active {
            color: var(--clr-text);
            font-weight: 500;
        }

        .breadcrumb li:not(:last-child)::after {
            content: "/";
            margin-left: 6px;
            opacity: 0.4;
        }

        /* ── Skeleton ─────────────────────────────────── */
        .skeleton {
            background: linear-gradient(90deg, #ede9e3 25%, #e4dfd8 50%, #ede9e3 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* ── Product Layout ───────────────────────────── */
        .product-page {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 40px 24px 0;
        }

        .product-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 52px;
            align-items: start;
            margin-bottom: 64px;
        }

        /* ── LEFT: Image Gallery ──────────────────────── */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .gallery-main {
            aspect-ratio: 1 / 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--clr-hover);
            border: 1px solid var(--clr-border);
            position: relative;
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.25s ease;
        }

        .gallery-main img.fade {
            opacity: 0;
        }

        .gallery-main-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            opacity: 0.2;
        }

        /* Thumbnail strip */
        .gallery-thumbs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--clr-border) transparent;
        }

        .gallery-thumbs::-webkit-scrollbar {
            height: 4px;
        }

        .gallery-thumbs::-webkit-scrollbar-track {
            background: transparent;
        }

        .gallery-thumbs::-webkit-scrollbar-thumb {
            background: var(--clr-border);
            border-radius: 4px;
        }

        .thumb-btn {
            flex-shrink: 0;
            width: 72px;
            height: 72px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0;
            background: var(--clr-hover);
            transition: border-color var(--transition);
        }

        .thumb-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb-btn.active {
            border-color: var(--clr-accent);
        }

        .thumb-btn:hover:not(.active) {
            border-color: var(--clr-border);
            filter: brightness(0.95);
        }

        /* ── RIGHT: Product Info ──────────────────────── */
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .product-category-link {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--clr-accent);
            text-decoration: none;
            margin-bottom: 10px;
            display: block;
        }

        .product-name {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .product-sku {
            font-size: 0.78rem;
            color: var(--clr-muted);
            margin-bottom: 20px;
        }

        .product-sku span {
            font-weight: 500;
            color: var(--clr-text);
        }

        /* Rating row */
        .rating-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .stars {
            color: #d4a84b;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .rating-text {
            font-size: 0.82rem;
            color: var(--clr-muted);
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid var(--clr-border);
            margin: 20px 0;
        }

        /* Price */
        .price-block {
            margin-bottom: 20px;
        }

        .price-main {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 600;
            line-height: 1;
            color: var(--clr-text);
        }

        .price-original {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--clr-muted);
            text-decoration: line-through;
            margin-left: 10px;
        }

        .price-savings {
            display: inline-block;
            margin-top: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--clr-success);
            background: var(--clr-success-lt);
            padding: 3px 9px;
            border-radius: 20px;
        }

        /* Variant picker */
        .variant-section {
            margin-bottom: 20px;
        }

        .variant-label {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--clr-muted);
            margin-bottom: 8px;
        }

        .variant-label span {
            color: var(--clr-text);
            font-weight: 500;
        }

        .variant-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .variant-pill {
            padding: 7px 14px;
            border: 1.5px solid var(--clr-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.82rem;
            cursor: pointer;
            background: var(--clr-surface);
            color: var(--clr-text);
            transition: all var(--transition);
            line-height: 1;
        }

        .variant-pill:hover {
            border-color: var(--clr-accent);
        }

        .variant-pill.active {
            border-color: var(--clr-accent);
            background: var(--clr-accent-lt);
            color: var(--clr-text);
            font-weight: 500;
        }

        .variant-pill.out-of-stock {
            opacity: 0.4;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        /* Stock badge */
        .stock-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .stock-badge.in-stock {
            color: var(--clr-success);
            background: var(--clr-success-lt);
        }

        .stock-badge.low-stock {
            color: var(--clr-warn);
            background: var(--clr-warn-lt);
        }

        .stock-badge.no-stock {
            color: #888;
            background: #f2f2f2;
        }

        .stock-badge i {
            font-size: 0.7rem;
        }

        /* Quantity stepper */
        .qty-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .qty-label {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--clr-muted);
        }

        .qty-stepper {
            display: flex;
            align-items: center;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--clr-surface);
            font-size: 1rem;
            cursor: pointer;
            color: var(--clr-text);
            transition: background var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .qty-btn:hover:not(:disabled) {
            background: var(--clr-hover);
        }

        .qty-btn:disabled {
            color: var(--clr-border);
            cursor: not-allowed;
        }

        .qty-value {
            width: 48px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            border-left: 1px solid var(--clr-border);
            border-right: 1px solid var(--clr-border);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CTA buttons */
        .cta-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-add-cart {
            padding: 14px 20px;
            background: var(--clr-text);
            color: #fff;
            border: 1.5px solid var(--clr-text);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add-cart:hover {
            background: var(--clr-accent);
            border-color: var(--clr-accent);
        }

        .btn-buy-now {
            padding: 14px 20px;
            background: var(--clr-accent);
            color: #fff;
            border: 1.5px solid var(--clr-accent);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-buy-now:hover {
            opacity: 0.88;
        }

        .btn-add-cart:disabled,
        .btn-buy-now:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Meta info strip */
        .meta-strip {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .meta-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.83rem;
            color: var(--clr-muted);
        }

        .meta-item i {
            color: var(--clr-accent);
            font-size: 0.85rem;
            margin-top: 2px;
            width: 16px;
            flex-shrink: 0;
        }

        .meta-item strong {
            color: var(--clr-text);
            font-weight: 500;
        }

        /* ── Description Section ──────────────────────── */
        .desc-section {
            border-top: 1px solid var(--clr-border);
            padding: 52px 0 64px;
            max-width: var(--max-w);
            margin: 0 auto;
            padding-left: 24px;
            padding-right: 24px;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--clr-accent);
            margin-bottom: 12px;
        }

        .desc-section h2 {
            font-family: var(--font-display);
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        .desc-body {
            font-size: 0.95rem;
            color: var(--clr-muted);
            line-height: 1.85;
            max-width: 720px;
            white-space: pre-wrap;
        }

        /* Specs table */
        .specs-table {
            margin-top: 32px;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            max-width: 600px;
        }

        .specs-table-title {
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--clr-muted);
            padding: 14px 20px;
            background: var(--clr-hover);
            border-bottom: 1px solid var(--clr-border);
        }

        .spec-row {
            display: grid;
            grid-template-columns: 180px 1fr;
            border-bottom: 1px solid var(--clr-border);
        }

        .spec-row:last-child {
            border-bottom: none;
        }

        .spec-key {
            padding: 12px 20px;
            font-size: 0.83rem;
            font-weight: 500;
            color: var(--clr-text);
            background: var(--clr-hover);
            border-right: 1px solid var(--clr-border);
        }

        .spec-val {
            padding: 12px 20px;
            font-size: 0.83rem;
            color: var(--clr-muted);
        }

        /* ── Related Products ─────────────────────────── */
        .related-section {
            background: var(--clr-surface);
            border-top: 1px solid var(--clr-border);
            padding: 56px 0 72px;
        }

        .related-inner {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
        }

        .related-header {
            margin-bottom: 32px;
        }

        .related-header h2 {
            font-family: var(--font-display);
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .related-header p {
            font-size: 0.88rem;
            color: var(--clr-muted);
            margin-top: 4px;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 20px;
        }

        .product-card {
            display: block;
            text-decoration: none;
            color: var(--clr-text);
            background: var(--clr-bg);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: rgba(181, 129, 62, 0.35);
        }

        .product-card:hover .prod-img {
            transform: scale(1.05);
        }

        .prod-img-wrap {
            aspect-ratio: 1/1;
            overflow: hidden;
            background: var(--clr-hover);
        }

        .prod-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .prod-img-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            opacity: 0.25;
        }

        .prod-info {
            padding: 14px 16px 16px;
        }

        .prod-name {
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.35;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prod-price {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
        }

        /* Related skeletons */
        .rel-skel {
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--clr-border);
        }

        .rel-skel-img {
            aspect-ratio: 1/1;
        }

        .rel-skel-body {
            padding: 14px 16px;
        }

        /* ── Cart Popup ───────────────────────────────── */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 12, 10, 0.55);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
        }

        .cart-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .cart-popup {
            background: var(--clr-surface);
            border-radius: var(--radius-lg);
            padding: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            transform: translateY(20px) scale(0.97);
            transition: transform 0.25s ease;
            position: relative;
        }

        .cart-overlay.open .cart-popup {
            transform: translateY(0) scale(1);
        }

        .cart-popup-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--clr-border);
            background: var(--clr-surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            color: var(--clr-muted);
            transition: background var(--transition), color var(--transition);
        }

        .cart-popup-close:hover {
            background: var(--clr-hover);
            color: var(--clr-text);
        }

        .cart-popup-success {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--clr-success);
            margin-bottom: 20px;
        }

        .cart-popup-success i {
            font-size: 1rem;
        }

        .cart-popup-product {
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 14px;
            background: var(--clr-hover);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
        }

        .cart-popup-img {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--clr-border);
        }

        .cart-popup-img-ph {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-sm);
            background: var(--clr-accent-lt);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .cart-popup-details {
            flex: 1;
            min-width: 0;
        }

        .cart-popup-name {
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.35;
            margin-bottom: 4px;
        }

        .cart-popup-variant {
            font-size: 0.78rem;
            color: var(--clr-muted);
        }

        .cart-popup-price {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            margin-top: 4px;
        }

        /* ── Responsive ───────────────────────────────── */
        @media (max-width: 860px) {

                gap: 12px;
            }
        }
    </style>
</head>

            <span>© 2026 Furniquin. All rights reserved.</span>
            <span style="font-size:0.82rem;"><a href="#"
                    style="color:rgba(255,255,255,0.45);text-decoration:none;">Privacy</a> · <a href="#"
                    style="color:rgba(255,255,255,0.45);text-decoration:none;">Terms</a></span>
        </div>
    </footer>

    <script type="module">
        const BASE_URL = "http://localhost:8000";
        /* ─── Utilities ──────────────────────────────────── */
        function esc(s) {
            return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        function formatINR(num) {
            return "₹" + Math.round(Number(num)).toLocaleString("en-IN");
        }
        function finalPrice(variant) {
            const d = variant.discountPercentage || 0;
            return d > 0 ? variant.price * (1 - d / 100) : variant.price;
        }

        /* ─── Cart (localStorage) ────────────────────────── */
        const CART_KEY = "furniquin_cart";

        function getCart() {
            try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
            catch { return []; }
        }
        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }
        function cartItemCount() {
            return getCart().reduce((s, i) => s + i.qty, 0);
        }
        function updateCartBadge() {
            const n = cartItemCount();
            document.getElementById("header-cart-count").textContent = n;
        }

        function addToCart(item) {
            // item: { productId, slug, name, sku, variantId, color, size, material, price, image }
            const cart = getCart();
            const existing = cart.find(c => c.sku === item.sku);
            if (existing) {
                existing.qty += item.qty;
            } else {
                cart.push({ ...item });
            }
            saveCart(cart);
            updateCartBadge();
        }

        /* ─── URL params ─────────────────────────────────── */
        const params = new URLSearchParams(location.search);
        const slug = params.get("slug") || "";

        /* ─── State ──────────────────────────────────────── */
        let productData = null;
        let selectedVariantIdx = 0;
        let quantity = 1;

        /* ─── Fetch product ──────────────────────────────── */
        async function loadProduct() {
            if (!slug) return renderError("No product specified.");
            try {
                const res = await fetch(`${BASE_URL}/product/${encodeURIComponent(slug)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data.success || !data.product) throw new Error(data.message || "Not found");

                productData = data.product;
                renderProduct(productData);
                updateCartBadge();

                // Load related after main render
                loadRelated(productData._id);
            } catch (err) {
                console.error(err);
                renderError("Product not found or unavailable.");
            }
        }

        /* ─── Render product ─────────────────────────────── */
        function renderProduct(p) {
            document.title = `${p.name} — Furniquin`;

            // Breadcrumb
            if (p.category) {
                const catLink = document.getElementById("bc-cat-link");
                catLink.textContent = p.category.name || "Collections";
                catLink.href = `category.html?slug=${encodeURIComponent(p.category.slug || "")}`;
            }
            document.getElementById("bc-product").textContent = p.name;

            // Build gallery
            renderGallery(p.images || []);

            // Build info panel
            renderInfo(p);

            // Description + specs
            renderDescription(p);
        }

        /* ─── Gallery ────────────────────────────────────── */
        let activeImgIdx = 0;

        function renderGallery(images) {
            const primaryIdx = images.findIndex(img => img.isPrimary);
            activeImgIdx = primaryIdx >= 0 ? primaryIdx : 0;

            const mainHtml = images.length > 0
                ? `<img id="gallery-main-img" src="${esc(images[activeImgIdx].url)}" alt="Product image" />`
                : `<div class="gallery-main-placeholder"><i class="fas fa-couch"></i></div>`;

            const thumbsHtml = images.length > 1
                ? images.map((img, i) => `
                    <button class="thumb-btn ${i === activeImgIdx ? "active" : ""}" data-idx="${i}" aria-label="View image ${i + 1}">
                        <img src="${esc(img.url)}" alt="Thumbnail ${i + 1}" loading="lazy" />
                    </button>`).join("")
                : "";

            document.getElementById("product-main").innerHTML = `
                <div class="gallery">
                    <div class="gallery-main" id="gallery-main">${mainHtml}</div>
                    ${thumbsHtml ? `<div class="gallery-thumbs" id="gallery-thumbs">${thumbsHtml}</div>` : ""}
                </div>
                <div class="product-info" id="product-info-panel"></div>
            `;

            // Thumbnail click handlers
            document.querySelectorAll(".thumb-btn").forEach(btn => {
                btn.addEventListener("click", () => switchImage(Number(btn.dataset.idx), images));
            });
        }

        function switchImage(idx, images) {
            const mainImg = document.getElementById("gallery-main-img");
            if (!mainImg) return;

            // Fade out
            mainImg.classList.add("fade");
            setTimeout(() => {
                mainImg.src = images[idx].url;
                mainImg.onload = () => mainImg.classList.remove("fade");
                mainImg.onerror = () => mainImg.classList.remove("fade");
            }, 200);

            // Update active thumb
            document.querySelectorAll(".thumb-btn").forEach((b, i) => {
                b.classList.toggle("active", i === idx);
            });
            activeImgIdx = idx;
        }

        /* ─── Info Panel ─────────────────────────────────── */
        function renderInfo(p) {
            const panel = document.getElementById("product-info-panel");
            const variant = p.variants[selectedVariantIdx];

            // Stars
            const avg = Number(p.averageRating || 0).toFixed(1);
            const stars = renderStars(avg);

            // Stock badge
            const stockHtml = stockBadge(variant.stock);

            // Price
            const fp = finalPrice(variant);
            const disc = variant.discountPercentage || 0;
            const priceHtml = disc > 0
                ? `<span class="price-main">${formatINR(fp)}</span>
                   <span class="price-original">${formatINR(variant.price)}</span>
                   <br><span class="price-savings">You save ${formatINR(variant.price - fp)} (${disc}%)</span>`
                : `<span class="price-main">${formatINR(fp)}</span>`;

            // Variant pills (group by what differentiates them)
            const variantPillsHtml = p.variants.length > 1
                ? `<div class="variant-section">
                       <p class="variant-label">Variant: <span id="variant-label-val">${esc(variantDisplayLabel(variant))}</span></p>
                       <div class="variant-pills">
                           ${p.variants.map((v, i) => `
                               <button class="variant-pill ${i === selectedVariantIdx ? "active" : ""} ${v.stock === 0 ? "out-of-stock" : ""}"
                                   data-idx="${i}" title="${v.stock === 0 ? "Out of stock" : ""}">
                                   ${esc(variantDisplayLabel(v))}
                               </button>`).join("")}
                       </div>
                   </div>`
                : "";

            // Meta info
            const metaItems = [];
            if (p.brand) metaItems.push(`<div class="meta-item"><i class="fas fa-tag"></i><span>Brand: <strong>${esc(p.brand)}</strong></span></div>`);
            if (p.warranty) metaItems.push(`<div class="meta-item"><i class="fas fa-shield-alt"></i><span>Warranty: <strong>${esc(p.warranty)}</strong></span></div>`);
            metaItems.push(`<div class="meta-item"><i class="fas fa-truck"></i><span>Free shipping on orders above ₹5,000</span></div>`);
            metaItems.push(`<div class="meta-item"><i class="fas fa-undo-alt"></i><span>30-day hassle-free returns</span></div>`);

            const outOfStock = variant.stock === 0;

            panel.innerHTML = `
                ${p.category ? `<a class="product-category-link" href="category.html?slug=${esc(p.category.slug || "")}">${esc(p.category.name || "")}</a>` : ""}
                <h1 class="product-name">${esc(p.name)}</h1>
                <p class="product-sku">SKU: <span id="sku-val">${esc(variant.sku)}</span></p>

                <div class="rating-row">
                    <span class="stars">${stars}</span>
                    <span class="rating-text">${avg} · ${p.totalReviews || 0} review${p.totalReviews !== 1 ? "s" : ""}</span>
                </div>

                <hr class="divider" />

                <div class="price-block" id="price-block">${priceHtml}</div>

                ${variantPillsHtml}

                <div id="stock-badge-wrap">${stockHtml}</div>

                <div class="qty-row">
                    <span class="qty-label">Quantity</span>
                    <div class="qty-stepper">
                        <button class="qty-btn" id="qty-minus" aria-label="Decrease quantity" disabled>−</button>
                        <div class="qty-value" id="qty-value">1</div>
                        <button class="qty-btn" id="qty-plus" aria-label="Increase quantity">+</button>
                    </div>
                </div>

                <div class="cta-group">
                    <button class="btn-add-cart" id="btn-add-cart" ${outOfStock ? "disabled" : ""}>
                        <i class="fas fa-shopping-bag"></i> Add to Cart
                    </button>
                    <button class="btn-buy-now" id="btn-buy-now" ${outOfStock ? "disabled" : ""}>
                        Buy It Now <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <div class="meta-strip">${metaItems.join("")}</div>
            `;

            // Reset quantity
            quantity = 1;
            updateQtyUI();

            // Wire variant pills
            panel.querySelectorAll(".variant-pill").forEach(btn => {
                btn.addEventListener("click", () => {
                    const idx = Number(btn.dataset.idx);
                    if (p.variants[idx].stock === 0) return; // out of stock guard
                    selectedVariantIdx = idx;
                    quantity = 1;
                    renderInfo(p); // re-render info with new variant
                });
            });

            // Wire qty buttons
            document.getElementById("qty-minus").addEventListener("click", () => {
                if (quantity > 1) { quantity--; updateQtyUI(); }
            });
            document.getElementById("qty-plus").addEventListener("click", () => {
                const maxStock = p.variants[selectedVariantIdx].stock;
                if (quantity < maxStock) { quantity++; updateQtyUI(); }
            });

            // Add to cart
            document.getElementById("btn-add-cart").addEventListener("click", () => {
                const v = p.variants[selectedVariantIdx];
                const img = (p.images || []).find(i => i.isPrimary) || p.images?.[0];

                console.log(v._id)

                addToCart({
                    productId: p._id,
                    slug: p.slug,
                    name: p.name,
                    sku: v.sku,
                    variantId: v._id,
                    color: v.color || null,
                    size: v.size || null,
                    material: v.material || null,
                    price: finalPrice(v),
                    image: img?.url || null,
                    qty: quantity,
                });
                openCartPopup(p, v, img);
            });

            // Buy now
            document.getElementById("btn-buy-now").addEventListener("click", () => {
                const v = p.variants[selectedVariantIdx];
                const img = (p.images || []).find(i => i.isPrimary) || p.images?.[0];

                addToCart({
                    productId: p._id,
                    slug: p.slug,
                    name: p.name,
                    sku: v.sku,
                    variantId: v._id,
                    color: v.color || null,
                    size: v.size || null,
                    material: v.material || null,
                    price: finalPrice(v),
                    image: img?.url || null,
                    qty: quantity,
                });

                window.location.href = "checkout.html";
            });
        }

        /* ─── Qty UI helpers ─────────────────────────────── */
        function updateQtyUI() {
            const minusBtn = document.getElementById("qty-minus");
            const plusBtn = document.getElementById("qty-plus");
            const qtyEl = document.getElementById("qty-value");
            const maxStock = productData?.variants[selectedVariantIdx]?.stock ?? 999;
            if (!minusBtn || !plusBtn || !qtyEl) return;
            qtyEl.textContent = quantity;
            minusBtn.disabled = quantity <= 1;
            plusBtn.disabled = quantity >= maxStock;
        }

        /* ─── Star renderer ──────────────────────────────── */
        function renderStars(avg) {
            const full = Math.floor(avg);
            const half = avg - full >= 0.5;
            const empty = 5 - full - (half ? 1 : 0);
            return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty);
        }

        /* ─── Stock badge ─────────────────────────────────── */
        function stockBadge(stock) {
            if (stock === 0) return `<span class="stock-badge no-stock"><i class="fas fa-circle"></i>Out of stock</span>`;
            if (stock <= 5) return `<span class="stock-badge low-stock"><i class="fas fa-circle"></i>Only ${stock} left in stock</span>`;
            return `<span class="stock-badge in-stock"><i class="fas fa-circle"></i>In stock (${stock} available)</span>`;
        }

        /* ─── Variant label ──────────────────────────────── */
        function variantDisplayLabel(v) {
            const parts = [];
            if (v.color) parts.push(v.color);
            if (v.size) parts.push(v.size);
            if (v.material) parts.push(v.material);
            return parts.length > 0 ? parts.join(" / ") : v.sku;
        }

        /* ─── Description + Specs ────────────────────────── */
        function renderDescription(p) {
            let specsHtml = "";
            if (p.specifications && Object.keys(p.specifications).length > 0) {
                const rows = Object.entries(p.specifications)
                    .map(([k, v]) => `
                        <div class="spec-row">
                            <div class="spec-key">${esc(k)}</div>
                            <div class="spec-val">${esc(v)}</div>
                        </div>`).join("");
                specsHtml = `
                    <div class="specs-table">
                        <div class="specs-table-title">Specifications</div>
                        ${rows}
                    </div>`;
            }

            document.getElementById("desc-section-wrap").innerHTML = `
                <section class="desc-section">
                    <div class="section-label">About this piece</div>
                    <h2>Product Details</h2>
                    ${p.description ? `<p class="desc-body">${esc(p.description)}</p>` : ""}
                    ${specsHtml}
                </section>
            `;
        }

        /* ─── Related products ───────────────────────────── */
        async function loadRelated(productId) {
            const section = document.getElementById("related-section");
            const grid = document.getElementById("related-grid");
            section.style.display = "block";

            try {
                const res = await fetch(`${BASE_URL}/product/${encodeURIComponent(productId)}/related`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data.success) throw new Error();

                const related = data.related || [];
                if (related.length === 0) { section.style.display = "none"; return; }

                grid.innerHTML = related.map(prod => {
                    const img = (prod.images || []).find(i => i.isPrimary) || prod.images?.[0];
                    const v = (prod.variants || [])[0];
                    const fp = v ? formatINR(finalPrice(v)) : "";
                    return `
                        <a class="product-card" href="product.html?slug=${encodeURIComponent(prod.slug)}">
                            <div class="prod-img-wrap">
                                ${img
                            ? `<img class="prod-img" src="${esc(img.url)}" alt="${esc(prod.name)}" loading="lazy" />`
                            : `<div class="prod-img-ph"><i class="fas fa-couch"></i></div>`}
                            </div>
                            <div class="prod-info">
                                <div class="prod-name">${esc(prod.name)}</div>
                                ${fp ? `<div class="prod-price">${fp}</div>` : ""}
                            </div>
                        </a>`;
                }).join("");
            } catch {
                section.style.display = "none";
            }
        }

        /* ─── Cart Popup ─────────────────────────────────── */
        function openCartPopup(product, variant, img) {
            const overlay = document.getElementById("cartOverlay");
            const prodEl = document.getElementById("cartPopupProduct");
            const totalEl = document.getElementById("popup-cart-total");

            // Variant details string
            const variantDetails = [
                variant.color ? `Color: ${variant.color}` : null,
                variant.size ? `Size: ${variant.size}` : null,
                variant.material ? `Material: ${variant.material}` : null,
            ].filter(Boolean).join("  ·  ");

            const imgHtml = img?.url
                ? `<img class="cart-popup-img" src="${esc(img.url)}" alt="${esc(product.name)}" />`
                : `<div class="cart-popup-img-ph">🪑</div>`;

            prodEl.innerHTML = `
                ${imgHtml}
                <div class="cart-popup-details">
                    <div class="cart-popup-name">${esc(product.name)}</div>
                    ${variantDetails ? `<div class="cart-popup-variant">${esc(variantDetails)}</div>` : ""}
                    <div class="cart-popup-price">${formatINR(finalPrice(variant))}</div>
                </div>
            `;

            totalEl.textContent = cartItemCount();
            overlay.classList.add("open");

            // Trap focus inside popup
            document.getElementById("cartPopupClose").focus();
        }

        function closeCartPopup() {
            document.getElementById("cartOverlay").classList.remove("open");
        }

        // Close handlers
        document.getElementById("cartPopupClose").addEventListener("click", closeCartPopup);
        document.getElementById("cartContinueBtn").addEventListener("click", closeCartPopup);
        document.getElementById("cartOverlay").addEventListener("click", e => {
            if (e.target === document.getElementById("cartOverlay")) closeCartPopup();
        });
        document.addEventListener("keydown", e => {
            if (e.key === "Escape") closeCartPopup();
        });

        /* ─── Error state ─────────────────────────────────── */
        function renderError(msg) {
            document.getElementById("product-main").innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:80px 24px;color:var(--clr-muted);">
                    <i class="fas fa-exclamation-circle" style="font-size:2rem;display:block;margin-bottom:16px;opacity:0.35;"></i>
                    <h2 style="font-family:var(--font-display);font-size:1.5rem;color:var(--clr-text);margin-bottom:8px;">Oops!</h2>
                    <p style="margin-bottom:20px;">${esc(msg)}</p>
                    <a href="index.html" style="color:var(--clr-accent);text-decoration:none;font-weight:500;">← Return home</a>
                </div>`;
        }

        /* ─── Boot ────────────────────────────────────────── */
        updateCartBadge();
        if (!slug) {
            renderError("No product specified.");
        } else {
            loadProduct();
        }
    </script>
</body>

</html>
