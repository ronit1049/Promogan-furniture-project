<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Furniquin</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            background: #faf8f4;
        }

        /* HERO */
        .contact-hero {
            padding: 140px 5% 80px;
            text-align: center;
            position: relative;
            color: #fff;
            overflow: hidden;
        }

        /* SAME IMAGE AS SERVICES PAGE */
        .contact-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url("https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=1600&q=80") center/cover no-repeat;
            z-index: -2;
        }

        /* DARK OVERLAY */
        .contact-hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .contact-hero h1 {
            font-size: 48px;
            font-family: 'Playfair Display', serif;
            margin-bottom: 10px;
        }

        .contact-hero p {
            font-size: 16px;
            opacity: 0.9;
        }

        /* GRID */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 80px 5%;
        }

        /* FORM */
        .contact-form {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: #d4713a;
            box-shadow: 0 0 0 2px rgba(212, 113, 58, 0.1);
        }

        .contact-form button {
            padding: 14px;
            background: #d4713a;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 30px;
            font-size: 15px;
            transition: 0.3s;
        }

        .contact-form button:hover {
            background: #b85c2e;
            transform: translateY(-2px);
        }

        /* INFO */
        .contact-info {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .contact-info p {
            margin: 12px 0;
            font-size: 14px;
        }

        /* MAP */
        .map {
            width: 100%;
            height: 350px;
            border: none;
            margin-top: 40px;
            border-radius: 12px;
        }

        /* WHATSAPP BUTTON */
        .whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: #fff;
            padding: 16px;
            border-radius: 50%;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .whatsapp:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <!-- HERO -->
    <section class="contact-hero">
        <h1>Contact Us</h1>
        <p>We’re here to help. Reach out anytime.</p>
    </section>

    <!-- CONTACT -->
    <section class="contact-grid">

        <!-- FORM -->
        <div class="contact-form">
            <h2>Send Message</h2>

            <form onsubmit="sendMessage(event)">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>

        <!-- INFO -->
        <div class="contact-info">
            <h2>Contact Info</h2>
            <p><i class="fas fa-phone"></i> +91 98765 43210</p>
            <p><i class="fas fa-envelope"></i> info@furniquin.com</p>
            <p><i class="fas fa-map-marker-alt"></i> Mumbai, India</p>

            <!-- GOOGLE MAP -->
            <iframe class="map" src="https://www.google.com/maps?q=Mumbai&output=embed">
            </iframe>
        </div>

    </section>

    <!-- WHATSAPP -->
    <a href="https://wa.me/919876543210" target="_blank" class="whatsapp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        fetch("navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
                updateCartCount();
                updateWishlistCount();
            });
    </script>

    <script>
        function sendMessage(e) {
            e.preventDefault();
            alert("✅ Message sent successfully!");
            e.target.reset();
        }
    </script>
    <script src="./common.js"></script>
    <div id="navbar"></div>

    <script>
        fetch("navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>
    <script src="./script.js"></script>
</body>

</html>
